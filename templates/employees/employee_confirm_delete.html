{% extends "base.html" %}
{% block title %}Delete Employee | Employee QR Verification{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl rounded-2xl border border-rose-400/20 bg-white/[0.06] p-6 backdrop-blur-xl">
    <p class="text-sm font-semibold uppercase tracking-[0.25em] text-rose-300">Confirm deletion</p>
    <h1 class="mt-3 text-3xl font-bold text-white">Delete {{ employee.full_name }}?</h1>
    <p class="mt-4 text-slate-300">This removes the employee record and invalidates the public QR verification URL.</p>
    <form method="post" class="mt-6 flex gap-3">
        {% csrf_token %}
        <button type="submit" class="rounded-lg bg-rose-400 px-5 py-3 font-semibold text-slate-950 hover:bg-rose-300">Delete</button>
        <a href="{% url 'employees:employee_detail' employee.pk %}" class="rounded-lg border border-cyan-400/30 px-5 py-3 font-semibold text-cyan-100 hover:bg-cyan-400/10">Cancel</a>
    </form>
</div>
{% endblock %}
